<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tools | Team AïR Tools</title>
    <link rel="icon" type="image/png" href="air_ball.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        html { scrollbar-gutter: stable; }
        body { 
            font-family: 'Inter', sans-serif; background-color: #0f172a;
            background-image: url('image_3.png'); background-size: cover; 
            background-position: center; background-attachment: fixed; min-height: 100vh;
        }
        .nav-overlay-bg { 
            background-color: rgba(15, 23, 42, 0.9); border-bottom: 1px solid rgba(100, 116, 139, 0.2);
            backdrop-filter: blur(12px);
        }

        .btn-glow-active {
            box-shadow: 0 0 15px rgba(37, 99, 235, 0.4);
            transition: all 0.3s ease;
        }
        .btn-glow-active:hover {
            box-shadow: 0 0 25px rgba(37, 99, 235, 0.7);
            transform: translateY(-1px);
        }

        .nav-link-hover:hover {
            text-shadow: 0 0 8px rgba(147, 197, 253, 0.6);
            color: white;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade {
            opacity: 0;
            animation: slideUpFade 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .tool-card {
            background: rgba(30, 41, 59, 0.6); border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px); transition: all 0.4s ease;
            min-height: 320px;
        }
        .tool-card:hover { transform: translateY(-8px); border-color: rgba(59, 130, 246, 0.5); background: rgba(30, 41, 59, 0.8); }
        .coming-soon { opacity: 0.5; filter: grayscale(0.5); cursor: not-allowed; }
    </style>
</head>
<body class="text-gray-100 flex flex-col">

    <header class="nav-overlay-bg h-20 grid grid-cols-4 items-center px-8 sticky top-0 z-50 shadow-lg">
        <div class="col-span-1 flex justify-center border-r border-slate-600/30">
            <a href="index.html" class="flex items-center space-x-3 transition-all hover:opacity-80 group">
                <img src="logo.png" alt="Logo" class="h-10 w-auto filter drop-shadow-[0_0_5px_rgba(59,130,246,0.5)] group-hover:scale-105 transition-transform">
                <div class="h-6 w-px bg-slate-500/40"></div>
                <span class="text-xl font-bold tracking-wider text-blue-300 uppercase">Team AïR Tools</span>
            </a>
        </div>

        <div class="col-span-2 flex justify-center space-x-6">
            <a href="index.html" class="px-5 py-2 hover:bg-slate-700/80 rounded-lg text-gray-300 transition nav-link-hover text-sm">Home</a>
            <a href="announcements.html" class="px-5 py-2 hover:bg-slate-700/80 rounded-lg text-gray-300 transition nav-link-hover text-sm">Announcements</a>
            <a href="bounty-board.html" class="px-5 py-2 hover:bg-slate-700/80 rounded-lg text-gray-300 transition nav-link-hover text-sm">Bounty Board</a>
            <a href="tools.html" class="px-5 py-2 bg-blue-600 rounded-lg text-white font-semibold shadow-md transition btn-glow-active text-sm">Tools</a>
            <a href="shiny-dex.html" class="px-5 py-2 hover:bg-slate-700/80 rounded-lg text-gray-300 transition nav-link-hover text-sm">Shiny Dex</a>
        </div>
        <div class="col-span-1"></div>
    </header>

    <main class="flex-1 p-12 max-w-[1200px] mx-auto w-full pb-48">
        <div class="text-center mb-16 animate-fade">
            <h1 class="text-6xl font-black text-white uppercase tracking-tighter drop-shadow-[0_0_20px_rgba(59,130,246,0.5)]">Tools</h1>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- TOOL 1: BREEDING LAB -->
            <a href="breeding-lab.html" class="tool-card p-8 rounded-[2.5rem] flex flex-col items-center text-center animate-fade" style="animation-delay: 0.2s">
                <div class="text-5xl mb-6">🥚</div>
                <h2 class="text-2xl font-black uppercase mb-3">Shiny Breed Planner</h2>
                <p class="text-gray-400 text-sm mb-6 leading-relaxed">Lineage engine with IV range prediction and OT logic.</p>
                <div class="mt-auto px-6 py-2 bg-blue-600/20 border border-blue-500/30 rounded-full text-blue-300 text-[10px] font-bold uppercase tracking-widest">Launch Tool</div>
            </a>

            <!-- TOOL 2: GUIDES -->
            <a href="guides.html" class="tool-card p-8 rounded-[2.5rem] flex flex-col items-center text-center animate-fade" style="animation-delay: 0.3s">
                <div class="text-5xl mb-6">📖</div>
                <h2 class="text-2xl font-black uppercase mb-3">Guides</h2>
                <p class="text-gray-400 text-sm mb-6 leading-relaxed">Essential resources and walkthroughs for advanced hunting.</p>
                <div class="mt-auto px-6 py-2 bg-blue-600/20 border border-blue-500/30 rounded-full text-blue-300 text-[10px] font-bold uppercase tracking-widest">Open Guides</div>
            </a>

            <!-- TOOL 3: COMING SOON -->
            <div class="tool-card coming-soon p-8 rounded-[2.5rem] flex flex-col items-center justify-center text-center animate-fade" style="animation-delay: 0.4s">
                <div class="px-6 py-2 bg-slate-800 rounded-full text-gray-500 text-[10px] font-bold uppercase tracking-widest">Coming Soon</div>
            </div>
        </div>
    </main>

</body>
</html>
